<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160">
  <!-- Circuit traces -->
  <g stroke="#ffffff" stroke-opacity="0.07" fill="none" stroke-width="1" stroke-linecap="square">
    <path d="M0 40 H50 V80 H110 V40 H160"/>
    <path d="M0 120 H50 V80"/>
    <path d="M110 120 H160"/>
    <path d="M110 120 V160"/>
    <path d="M50 0 V40"/>
    <path d="M50 160 V120"/>
    <path d="M110 0 V40"/>
    <path d="M30 0 V20 H50"/>
    <path d="M0 60 H20 V40"/>
    <path d="M160 100 H140 V120"/>
    <path d="M130 160 V140 H110"/>
  </g>
  <!-- Solder pads / nodes -->
  <g fill="#ffffff" fill-opacity="0.07">
    <circle cx="50" cy="40" r="3"/>
    <circle cx="50" cy="80" r="3"/>
    <circle cx="110" cy="80" r="3"/>
    <circle cx="110" cy="40" r="3"/>
    <circle cx="50" cy="120" r="3"/>
    <circle cx="110" cy="120" r="3"/>
    <circle cx="20" cy="40" r="2"/>
    <circle cx="140" cy="120" r="2"/>
    <circle cx="30" cy="20" r="2"/>
    <circle cx="130" cy="140" r="2"/>
  </g>
  <!-- IC chip outline -->
  <rect x="71" y="68" width="18" height="24"
        fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <!-- Chip pins -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <line x1="71" y1="74" x2="65" y2="74"/>
    <line x1="71" y1="80" x2="65" y2="80"/>
    <line x1="71" y1="86" x2="65" y2="86"/>
    <line x1="89" y1="74" x2="95" y2="74"/>
    <line x1="89" y1="80" x2="95" y2="80"/>
    <line x1="89" y1="86" x2="95" y2="86"/>
  </g>
</svg>
